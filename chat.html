<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحادثات - لوحة التحكم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        .chat-container { height: calc(100vh - 140px); background: white; border-radius: 12px; overflow: hidden; display: flex; }
        .chat-sidebar { width: 300px; border-left: 1px solid #eee; display: flex; flex-direction: column; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; border-bottom: 1px solid #f8f9fa; cursor: pointer; transition: all 0.2s; }
        .chat-item:hover, .chat-item.active { background: #f8f9fa; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #f8f9fa; }
        .chat-header { padding: 15px; background: white; border-bottom: 1px solid #eee; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; position: relative; }
        .message.received { align-self: flex-start; background: white; border-bottom-right-radius: 2px; }
        .message.sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-left-radius: 2px; }
        .chat-input { padding: 15px; background: white; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light" id="navbar"></nav>

            <div class="container-fluid">
                <div class="chat-container shadow-sm">
                    <!-- Chat Sidebar -->
                    <div class="chat-sidebar">
                        <div class="p-3 border-bottom">
                            <input type="text" class="form-control" placeholder="بحث في المحادثات...">
                        </div>
                        <div class="chat-list">
                            <div class="chat-item active">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <h6 class="mb-0 fw-bold">د. أحمد محمد</h6>
                                    <small class="text-muted">10:30 ص</small>
                                </div>
                                <p class="text-muted small mb-0 text-truncate">شكراً لك، سأقوم بمراجعة الخطة...</p>
                            </div>
                            <div class="chat-item">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <h6 class="mb-0 fw-bold">سارة علي</h6>
                                    <small class="text-muted">أمس</small>
                                </div>
                                <p class="text-muted small mb-0 text-truncate">هل يمكن تأجيل الموعد؟</p>
                            </div>
                        </div>
                    </div>

                    <!-- Chat Main -->
                    <div class="chat-main">
                        <div class="chat-header d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center">
                                <div class="bg-primary-light rounded-circle p-2 me-2 text-primary">
                                    <i class="fas fa-user-md"></i>
                                </div>
                                <div>
                                    <h6 class="mb-0 fw-bold">د. أحمد محمد</h6>
                                    <small class="text-success">متصل الآن</small>
                                </div>
                            </div>
                            <button class="btn btn-light btn-sm text-danger">
                                <i class="fas fa-trash"></i> حذف المحادثة
                            </button>
                        </div>

                        <div class="chat-messages" id="messagesArea">
                            <div class="message received">
                                مرحباً، هل تم تحديث خطة التغذية للمريض رقم 5؟
                                <div class="small text-muted mt-1">10:25 ص</div>
                            </div>
                            <div class="message sent">
                                نعم دكتور، تم التحديث وإرسال الإشعار.
                                <div class="small text-white-50 mt-1">10:28 ص</div>
                            </div>
                            <div class="message received">
                                شكراً لك، سأقوم بمراجعة الخطة واعتمادها.
                                <div class="small text-muted mt-1">10:30 ص</div>
                            </div>
                        </div>

                        <div class="chat-input">
                            <form id="messageForm" class="d-flex gap-2">
                                <input type="text" class="form-control" placeholder="اكتب رسالتك هنا..." required>
                                <button type="button" class="btn btn-light"><i class="fas fa-paperclip"></i></button>
                                <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i></button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Layout.init('chat');
        });

        document.getElementById('messageForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = e.target.querySelector('input');
            const text = input.value;
            if (!text.trim()) return;

            const messagesArea = document.getElementById('messagesArea');
            const time = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            
            messagesArea.innerHTML += `
                <div class="message sent">
                    ${text}
                    <div class="small text-white-50 mt-1">${time}</div>
                </div>
            `;
            
            input.value = '';
            messagesArea.scrollTop = messagesArea.scrollHeight;
        });
    </script>
</body>
</html>
