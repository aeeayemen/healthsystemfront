<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاستشارات - لوحة التحكم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        /* تخصيصات إضافية */
        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .badge-pending {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .badge-confirmed {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .badge-completed {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .badge-cancelled {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .table-hover tbody tr:hover {
            background-color: rgba(0, 123, 255, 0.05);
        }
        
        .action-buttons .btn {
            margin-left: 5px;
            padding: 4px 8px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light" id="navbar"></nav>

            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-primary">الاستشارات الطبية</h2>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#consultModal" onclick="resetForm()">
                        <i class="fas fa-plus me-2"></i> حجز استشارة
                    </button>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover" id="consultationsTable">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>المريض</th>
                                        <th>الطبيب</th>
                                        <th>التاريخ والوقت</th>
                                        <th>الحالة</th>
                                        <th>ملاحظات</th>
                                        <th>الإجراءات</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- سيتم تعبئتها بالبيانات الوهمية -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Consultation Modal -->
    <div class="modal fade" id="consultModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">حجز استشارة جديدة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="consultForm">
                        <input type="hidden" id="consultId">
                        <div class="mb-3">
                            <label class="form-label">المريض</label>
                            <select class="form-select" id="consultPatient" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الطبيب</label>
                            <select class="form-select" id="consultDoctor" required></select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">التاريخ</label>
                                <input type="date" class="form-control" id="consultDate" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الوقت</label>
                                <input type="time" class="form-control" id="consultTime" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الحالة</label>
                            <select class="form-select" id="consultStatus">
                                <option value="pending">معلقة</option>
                                <option value="confirmed">مؤكدة</option>
                                <option value="completed">مكتملة</option>
                                <option value="cancelled">ملغاة</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">ملاحظات</label>
                            <textarea class="form-control" id="consultNotes" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">حفظ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        // بيانات وهمية للمرضى
        const dummyPatients = [
            { id: 1, name: "محمد أحمد", age: 45, phone: "0551234567", email: "mohamed@example.com" },
            { id: 2, name: "فاطمة خالد", age: 32, phone: "0509876543", email: "fatima@example.com" },
            { id: 3, name: "عبدالله سعيد", age: 60, phone: "0541122334", email: "abdullah@example.com" },
            { id: 4, name: "نورة محمد", age: 28, phone: "0539988776", email: "noura@example.com" },
            { id: 5, name: "خالد عمر", age: 50, phone: "0565544332", email: "khaled@example.com" },
            { id: 6, name: "سارة علي", age: 35, phone: "0587766554", email: "sara@example.com" }
        ];

        // بيانات وهمية للأطباء
        const dummyDoctors = [
            { id: 1, name: "د. أحمد علي", specialty: "أمراض القلب", phone: "0512345678", email: "ahmed@example.com" },
            { id: 2, name: "د. سارة محمد", specialty: "التغذية العلاجية", phone: "0528765432", email: "sara_dr@example.com" },
            { id: 3, name: "د. خالد حسين", specialty: "الطب العام", phone: "0531122334", email: "khaled_dr@example.com" },
            { id: 4, name: "د. نورهان أحمد", specialty: "الطب النفسي", phone: "0549988776", email: "nourhan@example.com" },
            { id: 5, name: "د. عمر فاروق", specialty: "الجهاز الهضمي", phone: "0555544332", email: "omar@example.com" }
        ];

        // بيانات وهمية للاستشارات
        let dummyConsultations = [
            { 
                id: 1, 
                patient_id: 1, 
                doctor_id: 2, 
                consultation_date: "2024-01-15", 
                time: "10:00",
                status: "completed",
                notes: "متابعة خطة التغذية الجديدة"
            },
            { 
                id: 2, 
                patient_id: 2, 
                doctor_id: 1, 
                consultation_date: "2024-01-16", 
                time: "14:30",
                status: "confirmed",
                notes: "فحص دوري للقلب"
            },
            { 
                id: 3, 
                patient_id: 3, 
                doctor_id: 3, 
                consultation_date: "2024-01-17", 
                time: "09:15",
                status: "pending",
                notes: "شكوى من آلام بالمعدة"
            },
            { 
                id: 4, 
                patient_id: 4, 
                doctor_id: 4, 
                consultation_date: "2024-01-18", 
                time: "16:00",
                status: "confirmed",
                notes: "جلسة علاج نفسي"
            },
            { 
                id: 5, 
                patient_id: 5, 
                doctor_id: 2, 
                consultation_date: "2024-01-14", 
                time: "11:30",
                status: "cancelled",
                notes: "تم الإلغاء من قبل المريض"
            },
            { 
                id: 6, 
                patient_id: 6, 
                doctor_id: 5, 
                consultation_date: "2024-01-19", 
                time: "13:45",
                status: "pending",
                notes: "متابعة حالة القولون"
            }
        ];

        let consultModal;
        let nextConsultId = dummyConsultations.length + 1;
        
        document.addEventListener('DOMContentLoaded', () => {
            // تهيئة التخطيط
            Layout.init('consultations');
            
            // تهيئة المودال
            consultModal = new bootstrap.Modal(document.getElementById('consultModal'));
            
            // تحميل البيانات الوهمية
            loadSelects();
            renderConsultations();
            
            // تعيين التاريخ الحالي كقيمة افتراضية
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('consultDate').value = today;
            
            // تعيين الوقت الحالي + ساعة كقيمة افتراضية
            const now = new Date();
            now.setHours(now.getHours() + 1);
            const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('consultTime').value = timeString;
        });

        function loadSelects() {
            // تحميل المرضى في القائمة المنسدلة
            const patientSelect = document.getElementById('consultPatient');
            patientSelect.innerHTML = '<option value="">اختر المريض...</option>' + 
                dummyPatients.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            
            // تحميل الأطباء في القائمة المنسدلة
            const doctorSelect = document.getElementById('consultDoctor');
            doctorSelect.innerHTML = '<option value="">اختر الطبيب...</option>' + 
                dummyDoctors.map(d => `<option value="${d.id}">${d.name} - ${d.specialty}</option>`).join('');
        }

        function renderConsultations() {
            const tbody = document.querySelector('#consultationsTable tbody');
            
            if (dummyConsultations.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">لا توجد استشارات مضافة بعد</td></tr>';
                return;
            }

            tbody.innerHTML = dummyConsultations.map(c => {
                // البحث عن المريض
                const patient = dummyPatients.find(p => p.id === c.patient_id);
                const patientName = patient ? patient.name : 'مريض غير معروف';
                
                // البحث عن الطبيب
                const doctor = dummyDoctors.find(d => d.id === c.doctor_id);
                const doctorName = doctor ? doctor.name : 'طبيب غير معروف';
                
                // تحويل التاريخ إلى تنسيق عربي
                const dateObj = new Date(c.consultation_date);
                const formattedDate = dateObj.toLocaleDateString('ar-SA', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                
                return `
                <tr>
                    <td>${c.id}</td>
                    <td>
                        <div class="fw-bold">${patientName}</div>
                        <small class="text-muted">${patient ? `(${patient.age} سنة)` : ''}</small>
                    </td>
                    <td>
                        <div class="fw-bold">${doctorName}</div>
                        <small class="text-muted">${doctor ? doctor.specialty : ''}</small>
                    </td>
                    <td>
                        <div class="d-flex flex-column">
                            <span class="fw-bold">${formattedDate}</span>
                            <span class="text-primary"><i class="far fa-clock me-1"></i> ${c.time}</span>
                        </div>
                    </td>
                    <td>
                        <span class="badge badge-${c.status}">
                            ${getStatusName(c.status)}
                        </span>
                    </td>
                    <td>
                        ${c.notes || '<span class="text-muted">لا توجد ملاحظات</span>'}
                    </td>
                    <td class="action-buttons">
                        <button class="btn btn-sm btn-light text-primary" onclick="editConsult(${c.id})" title="تعديل">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-light text-danger" onclick="deleteConsult(${c.id})" title="حذف">
                            <i class="fas fa-trash"></i>
                        </button>
                        <button class="btn btn-sm btn-light text-success" onclick="viewConsult(${c.id})" title="عرض التفاصيل">
                            <i class="fas fa-eye"></i>
                        </button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        function getStatusColor(status) {
            const colors = {
                'pending': 'warning',
                'confirmed': 'info', 
                'completed': 'success',
                'cancelled': 'danger'
            };
            return colors[status] || 'secondary';
        }

        function getStatusName(status) {
            const names = {
                'pending': 'معلقة',
                'confirmed': 'مؤكدة',
                'completed': 'مكتملة',
                'cancelled': 'ملغاة'
            };
            return names[status] || status;
        }

        function resetForm() {
            document.getElementById('consultForm').reset();
            document.getElementById('consultId').value = '';
            document.getElementById('modalTitle').innerText = 'حجز استشارة جديدة';
            
            // إعادة تعيين التاريخ والوقت الافتراضيين
            const today = new Date().toISOString().split('T')[0];
            const now = new Date();
            now.setHours(now.getHours() + 1);
            const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            
            document.getElementById('consultDate').value = today;
            document.getElementById('consultTime').value = timeString;
        }

        function editConsult(id) {
            // البحث عن الاستشارة
            const consult = dummyConsultations.find(c => c.id === id);
            if (!consult) {
                alert('الاستشارة غير موجودة');
                return;
            }

            document.getElementById('consultId').value = consult.id;
            document.getElementById('consultPatient').value = consult.patient_id;
            document.getElementById('consultDoctor').value = consult.doctor_id;
            document.getElementById('consultDate').value = consult.consultation_date;
            document.getElementById('consultTime').value = consult.time;
            document.getElementById('consultStatus').value = consult.status;
            document.getElementById('consultNotes').value = consult.notes || '';
            document.getElementById('modalTitle').innerText = 'تعديل الاستشارة';
            
            consultModal.show();
        }

        function viewConsult(id) {
            // البحث عن الاستشارة
            const consult = dummyConsultations.find(c => c.id === id);
            if (!consult) {
                alert('الاستشارة غير موجودة');
                return;
            }

            // البحث عن المريض والطبيب
            const patient = dummyPatients.find(p => p.id === consult.patient_id);
            const doctor = dummyDoctors.find(d => d.id === consult.doctor_id);

            // إنشاء نافذة عرض التفاصيل
            const detailHtml = `
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-md-6">
                            <h6 class="text-muted">المريض:</h6>
                            <p class="fw-bold">${patient ? patient.name : 'غير معروف'}</p>
                        </div>
                        <div class="col-md-6">
                            <h6 class="text-muted">الطبيب:</h6>
                            <p class="fw-bold">${doctor ? doctor.name : 'غير معروف'}</p>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <h6 class="text-muted">التاريخ:</h6>
                            <p class="fw-bold">${consult.consultation_date}</p>
                        </div>
                        <div class="col-md-6">
                            <h6 class="text-muted">الوقت:</h6>
                            <p class="fw-bold">${consult.time}</p>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-12">
                            <h6 class="text-muted">الحالة:</h6>
                            <p><span class="badge badge-${consult.status}">${getStatusName(consult.status)}</span></p>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-12">
                            <h6 class="text-muted">ملاحظات:</h6>
                            <p>${consult.notes || 'لا توجد ملاحظات'}</p>
                        </div>
                    </div>
                </div>
            `;

            // عرض التفاصيل في نافذة تنبيه أو مودال
            const detailModal = new bootstrap.Modal(document.getElementById('detailModal') || createDetailModal());
            document.getElementById('detailModalBody').innerHTML = detailHtml;
            detailModal.show();
        }

        function createDetailModal() {
            // إنشاء مودال لعرض التفاصيل إذا لم يكن موجوداً
            const modalDiv = document.createElement('div');
            modalDiv.className = 'modal fade';
            modalDiv.id = 'detailModal';
            modalDiv.tabIndex = -1;
            modalDiv.innerHTML = `
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">تفاصيل الاستشارة</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body" id="detailModalBody"></div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modalDiv);
            return modalDiv;
        }

        function deleteConsult(id) {
            if (!confirm('هل أنت متأكد من حذف هذه الاستشارة؟')) return;
            
            // حذف الاستشارة من المصفوفة
            dummyConsultations = dummyConsultations.filter(c => c.id !== id);
            
            // إعادة عرض الجدول
            renderConsultations();
            
            // عرض رسالة نجاح
            Layout.showToast('تم حذف الاستشارة بنجاح', 'success');
        }

        document.getElementById('consultForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const id = document.getElementById('consultId').value;
            const patientId = parseInt(document.getElementById('consultPatient').value);
            const doctorId = parseInt(document.getElementById('consultDoctor').value);
            const consultationDate = document.getElementById('consultDate').value;
            const time = document.getElementById('consultTime').value;
            const status = document.getElementById('consultStatus').value;
            const notes = document.getElementById('consultNotes').value;
            
            if (!patientId || !doctorId || !consultationDate || !time) {
                alert('يرجى ملء جميع الحقول المطلوبة');
                return;
            }
            
            if (id) {
                // تعديل استشارة موجودة
                const index = dummyConsultations.findIndex(c => c.id === parseInt(id));
                if (index !== -1) {
                    dummyConsultations[index] = {
                        ...dummyConsultations[index],
                        patient_id: patientId,
                        doctor_id: doctorId,
                        consultation_date: consultationDate,
                        time: time,
                        status: status,
                        notes: notes
                    };
                    
                    Layout.showToast('تم تعديل الاستشارة بنجاح', 'success');
                }
            } else {
                // إضافة استشارة جديدة
                const newConsult = {
                    id: nextConsultId++,
                    patient_id: patientId,
                    doctor_id: doctorId,
                    consultation_date: consultationDate,
                    time: time,
                    status: status,
                    notes: notes
                };
                
                dummyConsultations.push(newConsult);
                Layout.showToast('تم إضافة الاستشارة بنجاح', 'success');
            }
            
            // إغلاق المودال وإعادة عرض الجدول
            consultModal.hide();
            renderConsultations();
        });

        // وظيفة محاكاة للـ ApiService (لتوافقية مع الكود السابق)
        window.ApiService = {
            consultations: {
                getAll: () => Promise.resolve({ data: { data: dummyConsultations } }),
                get: (id) => Promise.resolve({ 
                    data: { 
                        data: dummyConsultations.find(c => c.id === id) 
                    } 
                }),
                create: (data) => {
                    const newId = Math.max(...dummyConsultations.map(c => c.id)) + 1;
                    dummyConsultations.push({ id: newId, ...data });
                    return Promise.resolve({ data: { success: true } });
                },
                update: (id, data) => {
                    const index = dummyConsultations.findIndex(c => c.id === id);
                    if (index !== -1) {
                        dummyConsultations[index] = { ...dummyConsultations[index], ...data };
                    }
                    return Promise.resolve({ data: { success: true } });
                },
                delete: (id) => {
                    dummyConsultations = dummyConsultations.filter(c => c.id !== id);
                    return Promise.resolve({ data: { success: true } });
                }
            },
            patients: {
                getAll: () => Promise.resolve({ data: { data: dummyPatients } })
            },
            doctors: {
                getAll: () => Promise.resolve({ data: { data: dummyDoctors } })
            }
        };
    </script>
</body>
</html>
