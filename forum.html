<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنتدى - لوحة التحكم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        .users-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            max-width: 300px;
        }

        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: #e9ecef;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .user-badge .remove-user {
            cursor: pointer;
            color: #dc3545;
            font-size: 0.75rem;
        }

        .user-badge .remove-user:hover {
            color: #a71d2a;
        }

        .add-user-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: #4361ee;
            color: white;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
        }

        .add-user-btn:hover {
            background: #3a56d4;
        }

        .user-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
        }

        .user-list-item:last-child {
            border-bottom: none;
        }

        .user-list-item .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #4361ee;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light" id="navbar"></nav>

            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-comments me-2"></i>المنتدى</h2>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus me-2"></i>إضافة منتدى
                    </button>
                </div>

                <div class="filter-bar">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-search"></i></span>
                                <input type="text" class="form-control" id="searchInput" placeholder="بحث بالاسم...">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>الرقم</th>
                                        <th>الاسم</th>
                                        <th>اسم الطبيب</th>
                                        <th>المستخدمين</th>
                                        <th>إجراءات</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">إضافة منتدى</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="dataForm">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label class="form-label">اسم المنتدى</label>
                            <input type="text" class="form-control" id="formName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الطبيب</label>
                            <select class="form-select" id="formDoctorId" required>
                                <option value="">اختر الطبيب...</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="saveData()">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">تأكيد الحذف</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>هل أنت متأكد من حذف هذا المنتدى؟</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">حذف</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add User to Forum Modal -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i>إضافة مستخدم للمنتدى</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="addUserForumId">
                    <div class="mb-3">
                        <label class="form-label">اختر المستخدم</label>
                        <select class="form-select" id="selectUser">
                            <option value="">اختر مستخدم...</option>
                        </select>
                    </div>
                    <div class="mt-3">
                        <h6>المستخدمين المتاحين:</h6>
                        <div id="availableUsersList" class="border rounded"
                            style="max-height: 250px; overflow-y: auto;">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="addUserToForum()">إضافة</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Remove User Confirmation Modal -->
    <div class="modal fade" id="removeUserModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title"><i class="fas fa-user-minus me-2"></i>إزالة مستخدم</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="removeUserForumId">
                    <input type="hidden" id="removeUserId">
                    <p>هل أنت متأكد من إزالة هذا المستخدم من المنتدى؟</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-danger btn-sm" onclick="confirmRemoveUser()">إزالة</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        let allData = [], filteredData = [], doctorsData = [], usersData = [], forumUsers = {};
        let formModal, deleteModal, addUserModal, removeUserModal, deleteId = null;

        document.addEventListener('DOMContentLoaded', () => {
            Layout.init('forum');
            formModal = new bootstrap.Modal(document.getElementById('formModal'));
            deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
            addUserModal = new bootstrap.Modal(document.getElementById('addUserModal'));
            removeUserModal = new bootstrap.Modal(document.getElementById('removeUserModal'));
            loadData();
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
        });

        function loadData() {
            // Load doctors
            doctorsData = db.get('doctors') || MOCK_DATA.doctors || [];
            // Load users
            usersData = db.get('users') || MOCK_DATA.users || [];
            // Load forums
            allData = db.get('forums') || MOCK_DATA.forums || [];
            // Load forum users (user assignments to forums)
            forumUsers = db.get('forumUsers') || initializeForumUsers();

            filteredData = [...allData];
            populateDoctorSelect();
            renderTable();
        }

        // Initialize default forum users if not exists
        function initializeForumUsers() {
            const defaultForumUsers = {
                1: [1, 2, 3],  // Forum 1 has users 1, 2, 3
                2: [2, 4, 5],  // Forum 2 has users 2, 4, 5
                3: [1, 6],     // Forum 3 has users 1, 6
                4: [3, 4, 7],  // Forum 4 has users 3, 4, 7
                5: [5, 8, 9],  // Forum 5 has users 5, 8, 9
                6: [1, 2],     // Forum 6 has users 1, 2
                7: [3, 6, 10]  // Forum 7 has users 3, 6, 10
            };
            db.save('forumUsers', defaultForumUsers);
            return defaultForumUsers;
        }

        function getDoctorName(doctorId) {
            const doctor = doctorsData.find(d => d.id === doctorId);
            return doctor ? doctor.name : 'غير معروف';
        }

        function getUserName(userId) {
            const user = usersData.find(u => u.id === userId);
            return user ? user.name : 'غير معروف';
        }

        function getForumUsers(forumId) {
            return forumUsers[forumId] || [];
        }

        function populateDoctorSelect() {
            const select = document.getElementById('formDoctorId');
            select.innerHTML = '<option value="">اختر الطبيب...</option>' +
                doctorsData.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
        }

        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            filteredData = allData.filter(item => item.name.toLowerCase().includes(query));
            renderTable();
        }

        function renderUsersColumn(forumId) {
            const users = getForumUsers(forumId);
            let html = '<div class="users-badges">';

            users.forEach(userId => {
                const userName = getUserName(userId);
                html += `
                    <span class="user-badge">
                        ${userName}
                        <i class="fas fa-times remove-user" onclick="openRemoveUserModal(${forumId}, ${userId})" title="إزالة"></i>
                    </span>
                `;
            });

            html += `<button class="add-user-btn" onclick="openAddUserModal(${forumId})">
                <i class="fas fa-plus"></i>
            </button>`;
            html += '</div>';

            return html;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = filteredData.length === 0
                ? '<tr><td colspan="5" class="text-center text-muted py-4">لا توجد منتديات</td></tr>'
                : filteredData.map(item => `
                    <tr>
                        <td>${item.id}</td>
                        <td><i class="fas fa-folder me-2 text-warning"></i>${item.name}</td>
                        <td><span class="badge bg-success">${getDoctorName(item.doctor_id)}</span></td>
                        <td>${renderUsersColumn(item.id)}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${item.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(${item.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'إضافة منتدى';
            document.getElementById('editId').value = '';
            document.getElementById('formName').value = '';
            document.getElementById('formDoctorId').value = '';
            formModal.show();
        }

        function openEditModal(id) {
            const item = allData.find(t => t.id === id);
            if (!item) return;
            document.getElementById('modalTitle').textContent = 'تعديل المنتدى';
            document.getElementById('editId').value = id;
            document.getElementById('formName').value = item.name;
            document.getElementById('formDoctorId').value = item.doctor_id;
            formModal.show();
        }

        function saveData() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('formName').value.trim();
            const doctor_id = parseInt(document.getElementById('formDoctorId').value);
            if (!name || !doctor_id) { alert('يرجى ملء جميع الحقول'); return; }

            let data = db.get('forums') || [...MOCK_DATA.forums];
            if (id) {
                const index = data.findIndex(t => t.id === parseInt(id));
                if (index !== -1) { data[index].name = name; data[index].doctor_id = doctor_id; }
            } else {
                const newId = Math.max(...data.map(t => t.id), 0) + 1;
                data.push({ id: newId, name, doctor_id });
                // Initialize empty users array for new forum
                forumUsers[newId] = [];
                db.save('forumUsers', forumUsers);
            }
            db.save('forums', data);
            formModal.hide();
            loadData();
        }

        function openDeleteModal(id) { deleteId = id; deleteModal.show(); }

        function confirmDelete() {
            if (!deleteId) return;
            let data = db.get('forums') || [...MOCK_DATA.forums];
            data = data.filter(t => t.id !== deleteId);
            db.save('forums', data);
            // Also remove forum users
            delete forumUsers[deleteId];
            db.save('forumUsers', forumUsers);
            deleteId = null;
            deleteModal.hide();
            loadData();
        }

        // User management functions
        function openAddUserModal(forumId) {
            document.getElementById('addUserForumId').value = forumId;

            // Get users not already in this forum
            const currentForumUsers = getForumUsers(forumId);
            const availableUsers = usersData.filter(u => !currentForumUsers.includes(u.id) && u.type !== 'admin');

            // Populate select
            const select = document.getElementById('selectUser');
            select.innerHTML = '<option value="">اختر مستخدم...</option>' +
                availableUsers.map(u => `<option value="${u.id}">${u.name} (${u.email})</option>`).join('');

            // Populate list
            const listDiv = document.getElementById('availableUsersList');
            if (availableUsers.length === 0) {
                listDiv.innerHTML = '<div class="text-center text-muted py-3">لا يوجد مستخدمين متاحين</div>';
            } else {
                listDiv.innerHTML = availableUsers.map(u => `
                    <div class="user-list-item">
                        <div class="user-info">
                            <div class="user-avatar">${u.name.charAt(0)}</div>
                            <div>
                                <div class="fw-bold">${u.name}</div>
                                <small class="text-muted">${u.email}</small>
                            </div>
                        </div>
                        <button class="btn btn-sm btn-outline-primary" onclick="quickAddUser(${forumId}, ${u.id})">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                `).join('');
            }

            addUserModal.show();
        }

        function addUserToForum() {
            const forumId = parseInt(document.getElementById('addUserForumId').value);
            const userId = parseInt(document.getElementById('selectUser').value);

            if (!userId) {
                alert('يرجى اختيار مستخدم');
                return;
            }

            quickAddUser(forumId, userId);
        }

        function quickAddUser(forumId, userId) {
            if (!forumUsers[forumId]) {
                forumUsers[forumId] = [];
            }

            if (!forumUsers[forumId].includes(userId)) {
                forumUsers[forumId].push(userId);
                db.save('forumUsers', forumUsers);
            }

            addUserModal.hide();
            loadData();
        }

        function openRemoveUserModal(forumId, userId) {
            document.getElementById('removeUserForumId').value = forumId;
            document.getElementById('removeUserId').value = userId;
            removeUserModal.show();
        }

        function confirmRemoveUser() {
            const forumId = parseInt(document.getElementById('removeUserForumId').value);
            const userId = parseInt(document.getElementById('removeUserId').value);

            if (forumUsers[forumId]) {
                forumUsers[forumId] = forumUsers[forumId].filter(id => id !== userId);
                db.save('forumUsers', forumUsers);
            }

            removeUserModal.hide();
            loadData();
        }
    </script>
</body>

</html>
