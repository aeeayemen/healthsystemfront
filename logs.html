<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجلات النظام - لوحة التحكم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light" id="navbar"></nav>

            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold text-primary">سجلات النظام</h2>
                </div>

                <div class="card">
                    <div class="card-header bg-white">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">سجل الأنشطة</h5>
                            <div class="d-flex gap-2">
                                <select class="form-select w-auto" id="filterType" onchange="renderLogs()">
                                    <option value="all">كل الأنواع</option>
                                    <option value="login">تسجيل دخول</option>
                                    <option value="create">إنشاء</option>
                                    <option value="update">تحديث</option>
                                    <option value="delete">حذف</option>
                                    <option value="error">خطأ</option>
                                </select>
                                <select class="form-select w-auto" id="filterUser" onchange="renderLogs()">
                                    <option value="all">كل المستخدمين</option>
                                    <!-- Injected by JS -->
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm" id="logsTable">
                                <thead>
                                    <tr>
                                        <th>الوقت</th>
                                        <th>المستخدم</th>
                                        <th>النوع</th>
                                        <th>الإجراء</th>
                                        <th>التفاصيل</th>
                                        <th>IP</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Injected by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Layout.init('logs');
            loadUsers();
            renderLogs();
        });

        function loadUsers() {
            const users = db.get('users');
            const select = document.getElementById('filterUser');
            select.innerHTML += users.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
        }

        function renderLogs() {
            // Mock logs if empty
            let logs = db.get('logs');
            if (!logs || logs.length === 0) {
                logs = [
                    { id: 1, timestamp: '2023-10-05 10:30:15', userId: 1, userName: 'Admin', type: 'login', action: 'تسجيل دخول', details: 'تم تسجيل الدخول بنجاح', ip: '192.168.1.1' },
                    { id: 2, timestamp: '2023-10-05 10:35:22', userId: 1, userName: 'Admin', type: 'create', action: 'إنشاء طبيب', details: 'تم إضافة طبيب جديد: د. أحمد', ip: '192.168.1.1' },
                    { id: 3, timestamp: '2023-10-05 11:00:45', userId: 2, userName: 'Dr. محمد', type: 'update', action: 'تحديث خطة', details: 'تم تحديث خطة التغذية #123', ip: '192.168.1.5' },
                    { id: 4, timestamp: '2023-10-05 11:15:30', userId: 1, userName: 'Admin', type: 'delete', action: 'حذف مستخدم', details: 'تم حذف المستخدم #45', ip: '192.168.1.1' },
                    { id: 5, timestamp: '2023-10-05 12:00:00', userId: 3, userName: 'User', type: 'error', action: 'فشل تسجيل الدخول', details: 'محاولة دخول بكلمة مرور خاطئة', ip: '192.168.1.20' }
                ];
                logs.forEach(l => db.add('logs', l));
            }

            const typeFilter = document.getElementById('filterType').value;
            const userFilter = document.getElementById('filterUser').value;

            let filtered = logs;
            if (typeFilter !== 'all') {
                filtered = filtered.filter(l => l.type === typeFilter);
            }
            if (userFilter !== 'all') {
                filtered = filtered.filter(l => l.userId == userFilter);
            }

            const tbody = document.querySelector('#logsTable tbody');
            tbody.innerHTML = filtered.map(log => `
                <tr>
                    <td><small>${log.timestamp}</small></td>
                    <td>${log.userName}</td>
                    <td>
                        <span class="badge bg-${getTypeColor(log.type)}-light text-${getTypeColor(log.type)}">
                            ${getTypeName(log.type)}
                        </span>
                    </td>
                    <td>${log.action}</td>
                    <td><small class="text-muted">${log.details}</small></td>
                    <td><small class="text-muted">${log.ip}</small></td>
                </tr>
            `).join('');
        }

        function getTypeColor(type) {
            return {
                login: 'info',
                create: 'success',
                update: 'warning',
                delete: 'danger',
                error: 'danger'
            }[type] || 'secondary';
        }

        function getTypeName(type) {
            return {
                login: 'دخول',
                create: 'إنشاء',
                update: 'تحديث',
                delete: 'حذف',
                error: 'خطأ'
            }[type] || type;
        }
    </script>
</body>
</html>
