<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فئات الوجبات - لوحة التحكم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>
        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light" id="navbar"></nav>
            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-layer-group me-2"></i>فئات الوجبات</h2>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus me-2"></i>إضافة فئة
                    </button>
                </div>
                <div class="card"><div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>الفئة</th>
                                    <th>الكربوهيدرات</th>
                                    <th>البروتين</th>
                                    <th>الدهون</th>
                                    <th>السعرات</th>
                                    <th>إجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <!-- Data will be loaded here -->
                            </tbody>
                        </table>
                    </div>
                </div></div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">إضافة فئة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="dataForm">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label class="form-label">اسم الفئة</label>
                            <input type="text" class="form-control" id="formName" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الكربوهيدرات (carbo)</label>
                                <input type="number" class="form-control" id="formCarbo" step="0.1" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">البروتين (protin)</label>
                                <input type="number" class="form-control" id="formProtin" step="0.1" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الدهون (fat)</label>
                                <input type="number" class="form-control" id="formFat" step="0.1" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">السعرات (energy)</label>
                                <input type="number" class="form-control" id="formEnergy" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="saveData()">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">تأكيد الحذف</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>هل أنت متأكد من حذف هذه الفئة؟</p>
                    <p class="text-muted small">سيتم حذف جميع الوجبات المرتبطة بهذه الفئة.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">حذف</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        let formModal, deleteModal, deleteId = null;

        document.addEventListener('DOMContentLoaded', () => {
            Layout.init('meal-categories');
            formModal = new bootstrap.Modal(document.getElementById('formModal'));
            deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
            loadData();
            document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
        });

        function loadData() {
            const categories = db.get('mealCategories') || MOCK_DATA.mealCategories || [];
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = categories.length === 0 
                ? '<tr><td colspan="7" class="text-center text-muted py-4">لا توجد فئات</td></tr>'
                : categories.map(c => `
                    <tr>
                        <td>${c.id}</td>
                        <td><strong>${c.name}</strong></td>
                        <td>${c.carbo} جم</td>
                        <td>${c.protin} جم</td>
                        <td>${c.fat} جم</td>
                        <td><strong>${c.energy}</strong> سعرة</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${c.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(${c.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'إضافة فئة';
            document.getElementById('editId').value = '';
            document.getElementById('formName').value = '';
            document.getElementById('formCarbo').value = '';
            document.getElementById('formProtin').value = '';
            document.getElementById('formFat').value = '';
            document.getElementById('formEnergy').value = '';
            formModal.show();
        }

        function openEditModal(id) {
            const categories = db.get('mealCategories') || MOCK_DATA.mealCategories || [];
            const category = categories.find(c => c.id === id);
            if (!category) return;

            document.getElementById('modalTitle').textContent = 'تعديل الفئة';
            document.getElementById('editId').value = id;
            document.getElementById('formName').value = category.name;
            document.getElementById('formCarbo').value = category.carbo;
            document.getElementById('formProtin').value = category.protin;
            document.getElementById('formFat').value = category.fat;
            document.getElementById('formEnergy').value = category.energy;
            formModal.show();
        }

        function saveData() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('formName').value.trim();
            const carbo = parseFloat(document.getElementById('formCarbo').value);
            const protin = parseFloat(document.getElementById('formProtin').value);
            const fat = parseFloat(document.getElementById('formFat').value);
            const energy = parseInt(document.getElementById('formEnergy').value);
            
            if (!name) {
                alert('يرجى إدخال اسم الفئة');
                return;
            }

            let categories = db.get('mealCategories') || [...MOCK_DATA.mealCategories];
            
            if (id) {
                const index = categories.findIndex(c => c.id === parseInt(id));
                if (index !== -1) {
                    categories[index] = { ...categories[index], name, carbo, protin, fat, energy };
                }
            } else {
                const newId = Math.max(...categories.map(c => c.id), 0) + 1;
                categories.push({ id: newId, name, carbo, protin, fat, energy });
            }
            
            db.save('mealCategories', categories);
            formModal.hide();
            loadData();
        }

        function openDeleteModal(id) {
            deleteId = id;
            deleteModal.show();
        }

        function confirmDelete() {
            if (!deleteId) return;
            
            let categories = db.get('mealCategories') || [...MOCK_DATA.mealCategories];
            categories = categories.filter(c => c.id !== deleteId);
            db.save('mealCategories', categories);
            
            deleteId = null;
            deleteModal.hide();
            loadData();
        }
    </script>
</body>
</html>
