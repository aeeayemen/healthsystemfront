<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفحص الطبي - لوحة التحكم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light" id="navbar"></nav>

            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-flask me-2"></i>الفحص الطبي</h2>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus me-2"></i>إضافة فحص
                    </button>
                </div>

                <div class="filter-bar">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-search"></i></span>
                                <input type="text" class="form-control" id="searchInput" placeholder="بحث بالاسم...">
                            </div>
                        </div>
                        <div class="col-md-2">
                            <select class="form-select" id="perPage">
                                <option value="10">10 لكل صفحة</option>
                                <option value="25">25 لكل صفحة</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>الرقم</th>
                                        <th>رقم المستخدم</th>
                                        <th>الاسم</th>
                                        <th>الصورة</th>
                                        <th>تاريخ الإنشاء</th>
                                        <th>إجراءات</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                    <tr><td>1</td><td><span class="badge bg-secondary">1</span></td><td>تحليل دم شامل</td><td><img src="https://via.placeholder.com/60x40?text=Blood" class="img-preview" onclick="showImage('https://via.placeholder.com/300x200?text=Blood+Test')"></td><td>2024-11-01</td><td><button class="btn btn-sm btn-outline-info me-1" onclick="viewDetails(1)"><i class="fas fa-eye"></i></button><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(1)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(1)"><i class="fas fa-trash"></i></button></td></tr>
                                    <tr><td>2</td><td><span class="badge bg-secondary">2</span></td><td>فحص الغدة الدرقية</td><td><img src="https://via.placeholder.com/60x40?text=Thyroid" class="img-preview" onclick="showImage('https://via.placeholder.com/300x200?text=Thyroid+Test')"></td><td>2024-11-05</td><td><button class="btn btn-sm btn-outline-info me-1" onclick="viewDetails(2)"><i class="fas fa-eye"></i></button><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(2)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(2)"><i class="fas fa-trash"></i></button></td></tr>
                                    <tr><td>3</td><td><span class="badge bg-secondary">3</span></td><td>تحليل السكر التراكمي</td><td><img src="https://via.placeholder.com/60x40?text=HbA1c" class="img-preview" onclick="showImage('https://via.placeholder.com/300x200?text=HbA1c+Test')"></td><td>2024-11-10</td><td><button class="btn btn-sm btn-outline-info me-1" onclick="viewDetails(3)"><i class="fas fa-eye"></i></button><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(3)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(3)"><i class="fas fa-trash"></i></button></td></tr>
                                    <tr><td>4</td><td><span class="badge bg-secondary">4</span></td><td>فحص الكوليسترول</td><td><img src="https://via.placeholder.com/60x40?text=Cholesterol" class="img-preview" onclick="showImage('https://via.placeholder.com/300x200?text=Cholesterol')"></td><td>2024-11-15</td><td><button class="btn btn-sm btn-outline-info me-1" onclick="viewDetails(4)"><i class="fas fa-eye"></i></button><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(4)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(4)"><i class="fas fa-trash"></i></button></td></tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="pagination-container">
                            <div class="text-muted" id="paginationInfo">عرض 0 من 0</div>
                            <nav>
                                <ul class="pagination mb-0" id="pagination"></ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">إضافة فحص</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="dataForm">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label class="form-label">رقم المستخدم (user_id)</label>
                            <input type="number" class="form-control" id="formUserId" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">اسم الفحص</label>
                            <input type="text" class="form-control" id="formName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">رابط الصورة</label>
                            <input type="url" class="form-control" id="formImage" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="saveData()">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">تأكيد الحذف</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body"><p>هل أنت متأكد من حذف هذا الفحص؟</p></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">حذف</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div class="modal fade" id="imageModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">صورة الفحص</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalImage" src="" alt="صورة الفحص" class="img-fluid">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        let allData = [], filteredData = [], currentPage = 1, perPage = 10;
        let formModal, deleteModal, deleteId = null;

        document.addEventListener('DOMContentLoaded', () => {
            Layout.init('medical-tests');
            formModal = new bootstrap.Modal(document.getElementById('formModal'));
            deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
            loadData();
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('perPage').addEventListener('change', handlePerPageChange);
            document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
        });

        function loadData() {
            allData = db.get('medicalTests') || MOCK_DATA.medicalTests || [];
            filteredData = [...allData];
            renderTable();
        }

        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            filteredData = allData.filter(item => item.name.toLowerCase().includes(query));
            currentPage = 1;
            renderTable();
        }

        function handlePerPageChange(e) { perPage = parseInt(e.target.value); currentPage = 1; renderTable(); }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const start = (currentPage - 1) * perPage;
            const pageData = filteredData.slice(start, start + perPage);

            tbody.innerHTML = pageData.length === 0 
                ? '<tr><td colspan="6" class="text-center text-muted py-4">لا توجد بيانات</td></tr>'
                : pageData.map(item => `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.user_id}</td>
                        <td>${item.name}</td>
                        <td><img src="${item.image}" alt="${item.name}" class="img-preview" onclick="showImage('${item.image}')"></td>
                        <td>${item.created_at}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-info me-1" onclick="viewDetails(${item.id})"><i class="fas fa-eye"></i></button>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${item.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(${item.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / perPage);
            const start = (currentPage - 1) * perPage + 1;
            const end = Math.min(currentPage * perPage, filteredData.length);
            document.getElementById('paginationInfo').textContent = `عرض ${filteredData.length > 0 ? start : 0} - ${end} من ${filteredData.length}`;

            let html = `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="goToPage(${currentPage - 1})">السابق</a></li>`;
            for (let i = 1; i <= totalPages; i++) html += `<li class="page-item ${currentPage === i ? 'active' : ''}"><a class="page-link" href="#" onclick="goToPage(${i})">${i}</a></li>`;
            html += `<li class="page-item ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="goToPage(${currentPage + 1})">التالي</a></li>`;
            document.getElementById('pagination').innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(filteredData.length / perPage);
            if (page >= 1 && page <= totalPages) { currentPage = page; renderTable(); }
        }

        function showImage(src) {
            document.getElementById('modalImage').src = src;
            new bootstrap.Modal(document.getElementById('imageModal')).show();
        }

        function viewDetails(id) { window.location.href = `medical-test-details.html?id=${id}`; }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'إضافة فحص';
            document.getElementById('editId').value = '';
            document.getElementById('formUserId').value = '';
            document.getElementById('formName').value = '';
            document.getElementById('formImage').value = '';
            formModal.show();
        }

        function openEditModal(id) {
            const item = allData.find(t => t.id === id);
            if (!item) return;
            document.getElementById('modalTitle').textContent = 'تعديل الفحص';
            document.getElementById('editId').value = id;
            document.getElementById('formUserId').value = item.user_id;
            document.getElementById('formName').value = item.name;
            document.getElementById('formImage').value = item.image;
            formModal.show();
        }

        function saveData() {
            const id = document.getElementById('editId').value;
            const user_id = parseInt(document.getElementById('formUserId').value);
            const name = document.getElementById('formName').value.trim();
            const image = document.getElementById('formImage').value.trim();
            if (!user_id || !name || !image) { alert('يرجى ملء جميع الحقول'); return; }

            let data = db.get('medicalTests') || [...MOCK_DATA.medicalTests];
            if (id) {
                const index = data.findIndex(t => t.id === parseInt(id));
                if (index !== -1) { data[index].user_id = user_id; data[index].name = name; data[index].image = image; }
            } else {
                const newId = Math.max(...data.map(t => t.id), 0) + 1;
                data.push({ id: newId, user_id, name, image, created_at: new Date().toISOString().split('T')[0] });
            }
            db.save('medicalTests', data);
            formModal.hide();
            loadData();
        }

        function openDeleteModal(id) { deleteId = id; deleteModal.show(); }

        function confirmDelete() {
            if (!deleteId) return;
            let data = db.get('medicalTests') || [...MOCK_DATA.medicalTests];
            data = data.filter(t => t.id !== deleteId);
            db.save('medicalTests', data);
            deleteId = null;
            deleteModal.hide();
            loadData();
        }
    </script>
</body>
</html>
