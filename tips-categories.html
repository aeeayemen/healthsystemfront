<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فئات النصائح - لوحة التحكم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light" id="navbar"></nav>

            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-tags me-2"></i>فئات النصائح</h2>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus me-2"></i>إضافة فئة
                    </button>
                </div>

                <div class="filter-bar">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-search"></i></span>
                                <input type="text" class="form-control" id="searchInput" placeholder="بحث بالاسم...">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>الرقم</th>
                                        <th>الاسم</th>
                                        <th>النوع</th>
                                        <th>إجراءات</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                    <tr><td>1</td><td>تغذية</td><td><span class="badge bg-success">nutrition</span></td><td><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(1)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(1)"><i class="fas fa-trash"></i></button></td></tr>
                                    <tr><td>2</td><td>رياضة</td><td><span class="badge bg-primary">exercise</span></td><td><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(2)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(2)"><i class="fas fa-trash"></i></button></td></tr>
                                    <tr><td>3</td><td>صحة نفسية</td><td><span class="badge bg-info">mental</span></td><td><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(3)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(3)"><i class="fas fa-trash"></i></button></td></tr>
                                    <tr><td>4</td><td>نوم</td><td><span class="badge bg-secondary">sleep</span></td><td><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(4)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(4)"><i class="fas fa-trash"></i></button></td></tr>
                                    <tr><td>5</td><td>عادات صحية</td><td><span class="badge bg-warning">habits</span></td><td><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(5)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(5)"><i class="fas fa-trash"></i></button></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">إضافة فئة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="dataForm">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label class="form-label">اسم الفئة</label>
                            <input type="text" class="form-control" id="formName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">النوع (type)</label>
                            <input type="text" class="form-control" id="formType" required placeholder="مثال: nutrition">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="saveData()">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">تأكيد الحذف</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>هل أنت متأكد من حذف هذه الفئة؟</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">حذف</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        let allData = [], filteredData = [];
        let formModal, deleteModal, deleteId = null;

        document.addEventListener('DOMContentLoaded', () => {
            Layout.init('tips-categories');
            formModal = new bootstrap.Modal(document.getElementById('formModal'));
            deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
            loadData();
            setupEventListeners();
        });

        function loadData() {
            allData = db.get('tipsCategories') || MOCK_DATA.tipsCategories || [];
            filteredData = [...allData];
            renderTable();
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
        }

        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            filteredData = allData.filter(item => item.name.toLowerCase().includes(query));
            renderTable();
        }

        function getTypeColor(type) {
            const colors = { 'nutrition': 'bg-success', 'exercise': 'bg-primary', 'mental': 'bg-info', 'sleep': 'bg-secondary', 'habits': 'bg-warning' };
            return colors[type] || 'bg-secondary';
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = filteredData.length === 0 
                ? '<tr><td colspan="4" class="text-center text-muted py-4">لا توجد فئات</td></tr>'
                : filteredData.map(item => `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.name}</td>
                        <td><span class="badge ${getTypeColor(item.type)}">${item.type}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${item.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(${item.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'إضافة فئة';
            document.getElementById('editId').value = '';
            document.getElementById('formName').value = '';
            document.getElementById('formType').value = '';
            formModal.show();
        }

        function openEditModal(id) {
            const item = allData.find(t => t.id === id);
            if (!item) return;
            document.getElementById('modalTitle').textContent = 'تعديل الفئة';
            document.getElementById('editId').value = id;
            document.getElementById('formName').value = item.name;
            document.getElementById('formType').value = item.type;
            formModal.show();
        }

        function saveData() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('formName').value.trim();
            const type = document.getElementById('formType').value.trim();
            if (!name || !type) { alert('يرجى ملء جميع الحقول'); return; }

            let data = db.get('tipsCategories') || [...MOCK_DATA.tipsCategories];
            if (id) {
                const index = data.findIndex(t => t.id === parseInt(id));
                if (index !== -1) { data[index].name = name; data[index].type = type; }
            } else {
                const newId = Math.max(...data.map(t => t.id), 0) + 1;
                data.push({ id: newId, name, type });
            }
            db.save('tipsCategories', data);
            formModal.hide();
            loadData();
        }

        function openDeleteModal(id) { deleteId = id; deleteModal.show(); }

        function confirmDelete() {
            if (!deleteId) return;
            let data = db.get('tipsCategories') || [...MOCK_DATA.tipsCategories];
            data = data.filter(t => t.id !== deleteId);
            db.save('tipsCategories', data);
            deleteId = null;
            deleteModal.hide();
            loadData();
        }
    </script>
</body>
</html>
