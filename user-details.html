<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المستخدم - لوحة التحكم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light" id="navbar"></nav>

            <div class="container-fluid">
                <div class="mb-4">
                    <a href="users.html" class="text-decoration-none text-muted">
                        <i class="fas fa-arrow-right me-1"></i> العودة للقائمة
                    </a>
                </div>

                <div class="row" id="userDetails">
                    <div class="col-12 text-center py-5">
                        <i class="fas fa-spinner fa-spin fa-3x text-primary"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Layout.init('users');
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            
            if (id) {
                renderUserDetails(id);
            } else {
                window.location.href = 'users.html';
            }
        });

        function renderUserDetails(id) {
            const user = db.getById('users', id);
            if (!user) {
                document.getElementById('userDetails').innerHTML = '<div class="alert alert-danger">المستخدم غير موجود</div>';
                return;
            }

            const doctors = db.get('doctors');
            const doctor = user.doctorId ? doctors.find(d => d.id == user.doctorId) : null;
            
            // Get Patient Details if user is patient
            let patientDetails = null;
            if (user.role === 'patient') {
                const patients = db.get('patients') || [];
                patientDetails = patients.find(p => p.userId == user.id);
            }

            let html = `
                <div class="col-lg-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body text-center">
                            <div class="bg-light rounded-circle d-inline-flex p-4 mb-3 text-primary">
                                <i class="fas fa-user fa-4x"></i>
                            </div>
                            <h4 class="fw-bold">${user.name}</h4>
                            <p class="text-muted">${user.email}</p>
                            
                            <div class="d-flex justify-content-center gap-2 mb-4">
                                <span class="badge bg-${user.status === 'active' ? 'success' : 'danger'}-light text-${user.status === 'active' ? 'success' : 'danger'}">
                                    ${user.status === 'active' ? 'نشط' : 'معطل'}
                                </span>
                                ${user.role === 'patient' ? `
                                <span class="badge bg-${user.type === 'subscribed' ? 'warning' : 'secondary'}-light text-${user.type === 'subscribed' ? 'warning' : 'secondary'}">
                                    ${user.type === 'subscribed' ? 'مشترك' : 'عادي'}
                                </span>
                                ` : ''}
                            </div>

                            <div class="d-grid gap-2">
                                <button class="btn btn-outline-primary" onclick="window.location.href='chat.html?userId=${user.id}'">
                                    <i class="fas fa-comment-alt me-2"></i> مراسلة
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <!-- Account Info -->
                    <div class="card mb-4">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">معلومات الحساب</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="text-muted small">الدور</label>
                                    <div class="fw-bold">${getRoleName(user.role)}</div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="text-muted small">تاريخ التسجيل</label>
                                    <div class="fw-bold">${user.joinDate || new Date().toLocaleDateString('ar-SA')}</div>
                                </div>
                                ${user.role === 'patient' ? `
                                <div class="col-md-6 mb-3">
                                    <label class="text-muted small">الطبيب المعالج</label>
                                    <div class="fw-bold">
                                        ${doctor ? `<a href="doctor-details.html?id=${doctor.id}" class="text-decoration-none">${doctor.name}</a>` : 'غير محدد'}
                                    </div>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>

                    ${user.role === 'patient' ? `
                    <!-- Health Data -->
                    <div class="card mb-4">
                        <div class="card-header bg-white">
                            <h5 class="mb-0"><i class="fas fa-heartbeat me-2 text-danger"></i> البيانات الصحية</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="text-muted small">الطول</label>
                                    <div class="fw-bold">${patientDetails?.height || '-'} سم</div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="text-muted small">الوزن</label>
                                    <div class="fw-bold">${patientDetails?.weight || '-'} كجم</div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="text-muted small">النشاط البدني</label>
                                    <div class="fw-bold">${patientDetails?.activityLevel || 'متوسط'}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Medical Tests -->
                    <div class="card mb-4">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <h5 class="mb-0"><i class="fas fa-flask me-2 text-info"></i> الفحوصات الطبية</h5>
                            <a href="medical-tests.html?userId=${user.id}" class="btn btn-sm btn-light">عرض الكل</a>
                        </div>
                        <div class="card-body">
                            <p class="text-muted text-center">لا توجد فحوصات حديثة</p>
                        </div>
                    </div>

                    <!-- Main Calculations -->
                    <div class="card mb-4">
                        <div class="card-header bg-white">
                            <h5 class="mb-0"><i class="fas fa-calculator me-2 text-success"></i> الحسابات الغذائية (MainCalculation)</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-3 mb-3">
                                    <label class="text-muted small">BMR</label>
                                    <div class="fw-bold">1500 kcal</div>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label class="text-muted small">TDEE</label>
                                    <div class="fw-bold">2200 kcal</div>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label class="text-muted small">BMI</label>
                                    <div class="fw-bold">24.5</div>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label class="text-muted small">الوزن المثالي</label>
                                    <div class="fw-bold">70 كجم</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Weekly Calculations -->
                    <div class="card mb-4">
                        <div class="card-header bg-white">
                            <h5 class="mb-0"><i class="fas fa-calendar-week me-2 text-warning"></i> القياسات الأسبوعية (WeeklyCalculations)</h5>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-sm">
                                    <thead>
                                        <tr>
                                            <th>الأسبوع</th>
                                            <th>الوزن</th>
                                            <th>الخصر</th>
                                            <th>الدهون %</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td>1</td>
                                            <td>75 كجم</td>
                                            <td>80 سم</td>
                                            <td>20%</td>
                                        </tr>
                                        <tr>
                                            <td>2</td>
                                            <td>74.5 كجم</td>
                                            <td>79 سم</td>
                                            <td>19.8%</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;
            
            document.getElementById('userDetails').innerHTML = html;
        }

        function getRoleName(role) {
            return { admin: 'مسؤول', doctor: 'طبيب', patient: 'مريض' }[role] || role;
        }
    </script>
</body>
</html>
