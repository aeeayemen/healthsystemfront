<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستخدمين الدافعين - لوحة التحكم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav class="navbar navbar-expand-lg navbar-light" id="navbar"></nav>

            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-credit-card me-2"></i>المستخدمين الدافعين</h2>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus me-2"></i>إضافة مستخدم
                    </button>
                </div>

                <div class="filter-bar">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-search"></i></span>
                                <input type="text" class="form-control" id="searchInput" placeholder="بحث بالاسم أو البريد...">
                            </div>
                        </div>
                        <div class="col-md-2">
                            <select class="form-select" id="perPage">
                                <option value="10">10 لكل صفحة</option>
                                <option value="25">25 لكل صفحة</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>الرقم</th>
                                        <th>الاسم</th>
                                        <th>البريد الإلكتروني</th>
                                        <th>كلمة المرور</th>
                                        <th>النوع</th>
                                        <th>إجراءات</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody">
                                    <tr><td>3</td><td>خالد عمر</td><td>khaled@example.com</td><td><span class="badge bg-success">paying</span></td><td><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(3)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(3)"><i class="fas fa-trash"></i></button></td></tr>
                                    <tr><td>4</td><td>فاطمة حسن</td><td>fatima@example.com</td><td><span class="badge bg-success">paying</span></td><td><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(4)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(4)"><i class="fas fa-trash"></i></button></td></tr>
                                    <tr><td>8</td><td>ريم محمد</td><td>reem@example.com</td><td><span class="badge bg-success">paying</span></td><td><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(8)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(8)"><i class="fas fa-trash"></i></button></td></tr>
                                    <tr><td>9</td><td>يوسف علي</td><td>yousef@example.com</td><td><span class="badge bg-success">paying</span></td><td><button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(9)"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(9)"><i class="fas fa-trash"></i></button></td></tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="pagination-container">
                            <div class="text-muted" id="paginationInfo">عرض 0 من 0</div>
                            <nav>
                                <ul class="pagination mb-0" id="pagination"></ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">إضافة مستخدم</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="dataForm">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label class="form-label">الاسم</label>
                            <input type="text" class="form-control" id="formName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">البريد الإلكتروني</label>
                            <input type="email" class="form-control" id="formEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">كلمة المرور</label>
                            <input type="password" class="form-control" id="formPassword" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="saveData()">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">تأكيد الحذف</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>هل أنت متأكد من حذف هذا المستخدم؟</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">حذف</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/mock-data.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        let allData = [], filteredData = [], currentPage = 1, perPage = 10;
        let formModal, deleteModal, deleteId = null;

        document.addEventListener('DOMContentLoaded', () => {
            Layout.init('users-paying');
            formModal = new bootstrap.Modal(document.getElementById('formModal'));
            deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
            loadData();
            setupEventListeners();
        });

        function loadData() {
            const users = db.get('users') || MOCK_DATA.users || [];
            allData = users.filter(u => u.type === 'paying');
            filteredData = [...allData];
            renderTable();
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('perPage').addEventListener('change', handlePerPageChange);
            document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
        }

        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            filteredData = allData.filter(item => 
                item.name.toLowerCase().includes(query) || item.email.toLowerCase().includes(query)
            );
            currentPage = 1;
            renderTable();
        }

        function handlePerPageChange(e) {
            perPage = parseInt(e.target.value);
            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const start = (currentPage - 1) * perPage;
            const pageData = filteredData.slice(start, start + perPage);

            tbody.innerHTML = pageData.length === 0 
                ? '<tr><td colspan="6" class="text-center text-muted py-4">لا توجد بيانات</td></tr>'
                : pageData.map(item => `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.name}</td>
                        <td>${item.email}</td>
                        <td><code>${item.password || '******'}</code></td>
                        <td><span class="badge bg-success">${item.type}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${item.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(${item.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / perPage);
            const start = (currentPage - 1) * perPage + 1;
            const end = Math.min(currentPage * perPage, filteredData.length);
            document.getElementById('paginationInfo').textContent = `عرض ${filteredData.length > 0 ? start : 0} - ${end} من ${filteredData.length}`;

            let html = `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="goToPage(${currentPage - 1})">السابق</a></li>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<li class="page-item ${currentPage === i ? 'active' : ''}"><a class="page-link" href="#" onclick="goToPage(${i})">${i}</a></li>`;
            }
            html += `<li class="page-item ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="goToPage(${currentPage + 1})">التالي</a></li>`;
            document.getElementById('pagination').innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(filteredData.length / perPage);
            if (page >= 1 && page <= totalPages) { currentPage = page; renderTable(); }
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'إضافة مستخدم';
            document.getElementById('editId').value = '';
            document.getElementById('formName').value = '';
            document.getElementById('formEmail').value = '';
            document.getElementById('formPassword').value = '';
            formModal.show();
        }

        function openEditModal(id) {
            const users = db.get('users') || MOCK_DATA.users || [];
            const user = users.find(u => u.id === id);
            if (!user) return;
            document.getElementById('modalTitle').textContent = 'تعديل المستخدم';
            document.getElementById('editId').value = id;
            document.getElementById('formName').value = user.name;
            document.getElementById('formEmail').value = user.email;
            document.getElementById('formPassword').value = user.password || '';
            formModal.show();
        }

        function saveData() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('formName').value.trim();
            const email = document.getElementById('formEmail').value.trim();
            const password = document.getElementById('formPassword').value.trim();
            if (!name || !email || !password) { alert('يرجى ملء جميع الحقول'); return; }

            let users = db.get('users') || [...MOCK_DATA.users];
            if (id) {
                const index = users.findIndex(u => u.id === parseInt(id));
                if (index !== -1) { users[index].name = name; users[index].email = email; users[index].password = password; }
            } else {
                const newId = Math.max(...users.map(u => u.id)) + 1;
                users.push({ id: newId, name, email, password, type: 'paying', created_at: new Date().toISOString().split('T')[0] });
            }
            db.save('users', users);
            formModal.hide();
            loadData();
        }

        function openDeleteModal(id) { deleteId = id; deleteModal.show(); }

        function confirmDelete() {
            if (!deleteId) return;
            let users = db.get('users') || [...MOCK_DATA.users];
            users = users.filter(u => u.id !== deleteId);
            db.save('users', users);
            deleteId = null;
            deleteModal.hide();
            loadData();
        }
    </script>
</body>
</html>
